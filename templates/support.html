{% extends 'base.html' %}
{% block title %}Support - Task Manager{% endblock %}

{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2>Support Ticket</h2>
      <p class="mb-0 text-muted">Submit your technical issue and our support team will get back to you shortly.</p>
    </div>
    <a class="btn btn-secondary" href="{{ url_for('dashboard') }}">Back to Dashboard</a>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body">
      <form method="post" action="{{ url_for('support') }}">
        <div class="mb-3">
          <label for="subject" class="form-label">Subject</label>
          <input id="subject" name="subject" type="text" class="form-control" placeholder="Issue summary" value="{{ subject|default('') }}" required>
        </div>
        <div class="mb-3">
          <label for="description" class="form-label">Description</label>
          <textarea id="description" name="description" class="form-control" rows="6" placeholder="Describe the issue in detail" required>{{ description|default('') }}</textarea>
        </div>
        <div class="d-flex justify-content-between align-items-center">
          <small class="text-muted">Your ticket is logged to our internal support queue.</small>
          <button type="submit" class="btn btn-primary">Submit Ticket</button>
        </div>
      </form>
    </div>
  </div>

  <style>
    .card {
      border-radius: 1rem;
    }
    .btn-primary {
      background-color: #542582;
      border-color: #542582;
    }
    .btn-primary:hover,
    .btn-primary:focus {
      background-color: #3f1d6a;
      border-color: #3f1d6a;
    }
  </style>
{% endblock %}
